spring.application.name=IntelliStudy

server.port=8080
gemini.api.key=${GEMINI_API_KEY}
# NEW: LangChain4j RAG config (Gemini key আগেরটাই ব্যবহার করবে)
langchain4j.google-ai-gemini.api-key=${gemini.api.key}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-2.5-flash
langchain4j.google-ai-gemini.embedding-model.model-name=text-embedding-004
# NEW END


# ═══════════════════════════════════════════════════
#  IntelliStudy — application.properties
# ═══════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────

# ── MySQL Database ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/intellistudy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── Gemini API ───────────────────────────────────────

# ── File Upload ──────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Session ──────────────────────────────────────────
server.servlet.session.timeout=60m

# ── Logging ──────────────────────────────────────────
logging.level.com.example.naim=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN

# ── Redis ────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# এই অংশটি গুরুত্বপূর্ণ
# spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/oauth2/code/google

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=TRACE