<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — IntelliStudy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #fff7f4 0%, #fce7f3 50%, #ede9fe 100%);
      font-family: 'Nunito', sans-serif;
    }
    .card {
      background: white; border-radius: 28px; padding: 52px 44px;
      box-shadow: 0 24px 80px rgba(255, 107, 53, 0.15);
      text-align: center; max-width: 420px; width: 90%;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo { font-size: 3.2rem; margin-bottom: 16px; }
    h1 { font-size: 1.9rem; font-weight: 900; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 0.95rem; margin-bottom: 36px; line-height: 1.6; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 24px; background: white;
      border: 2px solid #e5e7eb; border-radius: 100px; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      color: #1a1a2e; text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    }
    .btn-google:hover {
      border-color: #ff6b35; color: #ff6b35;
      box-shadow: 0 8px 28px rgba(255, 107, 53, 0.22);
      transform: translateY(-3px);
    }
    .g-icon { width: 22px; height: 22px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #ccc; font-size: 0.82rem; font-weight: 700; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f0f0f0; }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .feat { background: #fafafa; border-radius: 12px; padding: 12px; font-size: 0.8rem; font-weight: 700; color: #555; }
    .feat span { display: block; font-size: 1.2rem; margin-bottom: 4px; }
    .error-msg {
      color: #ef4444; font-size: 0.85rem; margin-top: 16px;
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; display: none;
    }
    .error-msg.show { display: block; }
    .footer-note { margin-top: 24px; font-size: 0.75rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧠</div>
    <h1>IntelliStudy</h1>
    <p class="subtitle">AI-powered learning tools.<br>Sign in to unlock all features.</p>

    <div class="features">
      <div class="feat"><span>📄</span>PDF Chat</div>
      <div class="feat"><span>✨</span>Summarize</div>
      <div class="feat"><span>🌐</span>Translate</div>
      <div class="feat"><span>🎯</span>Quiz</div>
    </div>

    <a href="/oauth2/authorization/google" class="btn-google">
      <!-- Google SVG logo -->
      <svg class="g-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="error-msg" id="errMsg">
      ⚠️ Login failed. Please try again.
    </div>

    <p class="footer-note">By signing in, you agree to use this app responsibly.</p>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error'))
      document.getElementById('errMsg').classList.add('show');
  </script>
  <script>
  // Already logged in? → index এ নিয়ে যাও
  fetch('/api/auth/status')
    .then(r => r.json())
    .then(d => { if (d.authenticated) window.location.href = '/index.html'; })
    .catch(() => {}); // ignore error, stay on login page
</script>
</body>
</html>
